<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Signal Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#fafaf7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400..600&display=swap" rel="stylesheet">

<style>
  :root {
    --stone-50:  #fafaf7;
    --stone-500: #8c887e;
    --stone-900: #111111;
    --indigo:    #4f46e5;
    --indigo-300:#a5b4fc;

    --geist:      'Geist', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --geist-mono: 'Geist Mono', ui-monospace, "SF Mono", Menlo, monospace;

    --hairline-2: rgba(17,17,17,0.06);

    /* mobile-tuned wordmark size — bigger relative to viewport for hero feel */
    --wm-size: clamp(48px, 14vw, 80px);
    --roll-distance: calc(var(--wm-size) * 9.5);
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--stone-50);
    color: var(--stone-900);
    font-family: var(--geist);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    overscroll-behavior: none;
  }

  .loader {
    position: fixed; inset: 0;
    background: var(--stone-50);
    overflow: hidden;
    font-family: var(--geist);
    /* respect iOS safe areas (notch, home indicator) */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ─── minimal chrome (mobile) ──────────────────────────────── */
  .chrome {
    position: absolute;
    font-family: var(--geist-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--stone-500);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    z-index: 5;
  }
  .chrome.tl { top: calc(env(safe-area-inset-top, 0px) + 20px); left: 20px; }
  .chrome.bl { bottom: calc(env(safe-area-inset-bottom, 0px) + 20px); left: 50%; transform: translateX(-50%); }
  .chrome .pip {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--indigo);
    animation: pip-live 1.6s cubic-bezier(.45,.05,.55,.95) infinite;
  }
  @keyframes pip-live { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

  .wm {
    display: inline-flex; align-items: baseline;
    font-family: var(--geist); font-weight: 500;
    letter-spacing: -0.025em; line-height: 0.95;
    font-size: 13px; color: var(--stone-900); text-transform: none;
  }
  .wm .dot-static {
    width: 0.16em; height: 0.16em; border-radius: 50%;
    background: var(--indigo);
    margin-left: 0.06em;
    align-self: flex-end;
    margin-bottom: 0.06em;
  }

  /* ─── stage + composer (identical choreography to master) ──── */
  .stage {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 48px;
    padding: 0 24px;
  }

  .composer {
    position: relative;
    display: inline-flex;
    align-items: baseline;
    font-family: var(--geist);
    font-weight: 500;
    font-size: var(--wm-size);
    line-height: 0.95;
    letter-spacing: -0.03em;
    color: var(--stone-900);
    padding-bottom: calc(var(--wm-size) * 0.25);
  }
  .composer::before {
    content: '';
    position: absolute;
    left: calc(-1 * var(--wm-size) * 3.8);
    right: calc(-1 * var(--wm-size) * 0.9);
    bottom: calc(var(--wm-size) * 0.15);
    height: 1px;
    background: var(--hairline-2);
  }

  .word { display: inline-flex; gap: 0; position: relative; z-index: 1; }
  .letter {
    display: inline-block;
    opacity: 0;
    transform: translateY(115%);
    color: var(--stone-900);
    will-change: opacity, transform;
  }
  .word .space { display: inline-block; width: 0.28em; }

  /* the rolling dot */
  .dot {
    position: relative;
    width: 0.16em; height: 0.16em;
    border-radius: 50%;
    background: var(--indigo);
    margin-left: 0.06em;
    align-self: flex-end;
    margin-bottom: 0.06em;
    transform-origin: center bottom;
    animation: dot-roll 5s cubic-bezier(.34,1.56,.64,1) infinite;
    z-index: 3;
  }
  @keyframes dot-roll {
    0%       { transform: translate(calc(-1 * var(--roll-distance)), 0) scale(1, 1);     opacity: 0; }
    4%       { transform: translate(calc(-1 * var(--roll-distance)), 0) scale(1, 1);     opacity: 1; }
    33%      { transform: translate(calc(-0.03 * var(--wm-size)), 0)    scale(1, 1);     opacity: 1; }
    35%      { transform: translate(0, 0)                                scale(1, 1);     opacity: 1; }
    38%      { transform: translate(0, 0)                                scale(1.55, 0.55); opacity: 1; }
    41%      { transform: translate(0, 0)                                scale(1.96, 0.4);  opacity: 1; }
    43%      { transform: translate(0, 0)                                scale(1.88, 0.43); opacity: 1; }
    48%      { transform: translate(0, calc(-0.075 * var(--wm-size)))    scale(0.74, 1.34); opacity: 1; }
    53%      { transform: translate(0, 0)                                scale(1.24, 0.82); opacity: 1; }
    57%      { transform: translate(0, 0)                                scale(0.96, 1.05); opacity: 1; }
    60%      { transform: translate(0, 0)                                scale(1, 1);     opacity: 1; }
    68%      { transform: translate(0, 0)                                scale(0.86, 0.86); opacity: 0.86; }
    77%      { transform: translate(0, 0)                                scale(1, 1);     opacity: 1; }
    92%      { transform: translate(0, 0)                                scale(1, 1);     opacity: 1; }
    100%     { transform: translate(0, 0)                                scale(1, 1);     opacity: 0; }
  }

  /* trail ghosts */
  .trail {
    position: absolute;
    width: 0.16em; height: 0.16em;
    border-radius: 50%;
    background: var(--indigo);
    align-self: flex-end;
    margin-bottom: 0.06em;
    margin-left: 0.06em;
    opacity: 0;
    z-index: 2;
  }
  .trail.t1 { animation: ghost-1 5s cubic-bezier(.34,1.56,.64,1) infinite; }
  .trail.t2 { animation: ghost-2 5s cubic-bezier(.34,1.56,.64,1) infinite; }
  .trail.t3 { animation: ghost-3 5s cubic-bezier(.34,1.56,.64,1) infinite; }
  @keyframes ghost-1 {
    0%, 5%   { transform: translate(calc(-1 * var(--roll-distance)), 0); opacity: 0; }
    14%      { transform: translate(calc(-0.85 * var(--roll-distance)), 0); opacity: 0.5; }
    26%      { transform: translate(calc(-0.2 * var(--roll-distance)), 0);  opacity: 0.26; }
    33%, 100%{ transform: translate(calc(-0.1 * var(--roll-distance)), 0);  opacity: 0; }
  }
  @keyframes ghost-2 {
    0%, 7%   { transform: translate(calc(-1 * var(--roll-distance)), 0); opacity: 0; }
    16%      { transform: translate(calc(-0.78 * var(--roll-distance)), 0); opacity: 0.36; }
    26%      { transform: translate(calc(-0.28 * var(--roll-distance)), 0); opacity: 0.18; }
    33%, 100%{ transform: translate(calc(-0.16 * var(--roll-distance)), 0); opacity: 0; }
  }
  @keyframes ghost-3 {
    0%, 9%   { transform: translate(calc(-1 * var(--roll-distance)), 0); opacity: 0; }
    18%      { transform: translate(calc(-0.7 * var(--roll-distance)), 0);  opacity: 0.24; }
    26%      { transform: translate(calc(-0.35 * var(--roll-distance)), 0); opacity: 0.11; }
    33%, 100%{ transform: translate(calc(-0.24 * var(--roll-distance)), 0); opacity: 0; }
  }

  /* impact ripples */
  .ripple, .ripple-slow {
    position: absolute;
    width: 0.16em; height: 0.16em;
    border-radius: 50%;
    background: transparent;
    align-self: flex-end;
    margin-bottom: 0.06em;
    margin-left: 0.06em;
    opacity: 0;
    transform: scale(1);
    z-index: 1;
  }
  .ripple      { border: 1px solid var(--indigo);     animation: ripple-fast 5s cubic-bezier(.22,.7,.2,1) infinite; }
  .ripple-slow { border: 1px solid var(--indigo-300); animation: ripple-slow 5s cubic-bezier(.22,.7,.2,1) infinite; }
  @keyframes ripple-fast {
    0%, 39%  { transform: scale(1);  opacity: 0; }
    41%      { transform: scale(1);  opacity: 0.7; }
    60%      { transform: scale(11); opacity: 0; }
    100%     { transform: scale(11); opacity: 0; }
  }
  @keyframes ripple-slow {
    0%, 39%  { transform: scale(1);  opacity: 0; }
    41%      { transform: scale(1);  opacity: 0.45; }
    74%      { transform: scale(22); opacity: 0; }
    100%     { transform: scale(22); opacity: 0; }
  }

  /* caption */
  .caption {
    font-family: var(--geist-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--stone-500);
    opacity: 0;
    animation: caption-in 5s cubic-bezier(.22,.7,.2,1) infinite;
  }
  @keyframes caption-in {
    0%, 62%  { opacity: 0; transform: translateY(4px); }
    74%, 92% { opacity: 1; transform: translateY(0); }
    100%     { opacity: 0; transform: translateY(0); }
  }

  /* respect reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .dot, .trail, .ripple, .ripple-slow, .caption, .chrome .pip {
      animation: none !important;
    }
    .dot { transform: translate(0, 0) scale(1, 1); opacity: 1; }
    .caption { opacity: 1; transform: translateY(0); }
    .trail, .ripple, .ripple-slow { display: none; }
  }
</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="stage">
    <div class="composer">
      <span class="word" id="word"></span>
      <span class="trail t1"></span>
      <span class="trail t2"></span>
      <span class="trail t3"></span>
      <span class="ripple-slow"></span>
      <span class="ripple"></span>
      <span class="dot"></span>
    </div>
    <div class="caption">the studio is ready</div>
  </div>

  <div class="chrome bl">
    <span class="pip"></span>
    <span id="meta">connecting</span>
  </div>
</div>

<script>
  /* Signal Studio · mobile loader
     —  optimized for portrait phone viewports
     —  identical choreography to desktop master
     —  fills viewport edge-to-edge with safe-area respect
  */
  (function () {
    const word = 'signal studio';
    const wordEl = document.getElementById('word');
    [...word].forEach((ch) => {
      const span = document.createElement('span');
      span.className = ch === ' ' ? 'letter space' : 'letter';
      span.textContent = ch === ' ' ? '\u00A0' : ch;
      wordEl.appendChild(span);
    });

    const reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduced) {
      document.querySelectorAll('.letter').forEach(el => {
        el.style.opacity = '1';
        el.style.transform = 'translateY(0)';
      });
      document.getElementById('meta').textContent = 'ready';
      return;
    }

    const allLetterEls = [...document.querySelectorAll('.letter')];
    const dotEl       = document.querySelector('.composer > .dot');
    const composerEl  = document.querySelector('.composer');
    const loaderEl    = document.getElementById('loader');
    const metaEl      = document.getElementById('meta');

    const PERIOD        = 5000;
    const FADE_OUT_AT   = 4700;
    const RISE_DURATION = 260;
    const RISE_LEAD     = 60;

    let start = performance.now();
    let risenAt = new Array(allLetterEls.length).fill(null);
    let lastCycle = 0;
    let letterCenters = [];
    let paused = false;
    let pausedAt = 0;
    let rafId = 0;

    function measure() {
      const composerLeft = composerEl.getBoundingClientRect().left;
      letterCenters = allLetterEls.map(el => {
        const r = el.getBoundingClientRect();
        return r.left + r.width / 2 - composerLeft;
      });
    }
    const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);

    function frame() {
      if (paused) return;
      const now = performance.now();
      const elapsed = now - start;
      const t = elapsed % PERIOD;
      const cycle = Math.floor(elapsed / PERIOD);
      if (cycle !== lastCycle) { risenAt.fill(null); lastCycle = cycle; }

      const composerLeft = composerEl.getBoundingClientRect().left;
      const dotRect = dotEl.getBoundingClientRect();
      const dotX = dotRect.left + dotRect.width / 2 - composerLeft;
      const dotOpacity = parseFloat(getComputedStyle(dotEl).opacity);

      allLetterEls.forEach((el, i) => {
        const letterX = letterCenters[i];
        if (letterX === undefined) return;
        const distance = letterX - dotX;

        if (t > FADE_OUT_AT) {
          const u = Math.min(1, (t - FADE_OUT_AT) / (PERIOD - FADE_OUT_AT));
          el.style.opacity = (risenAt[i] !== null ? 1 - u : 0).toString();
          el.style.transform = `translateY(${u * 6}%)`;
          return;
        }
        if (risenAt[i] === null && dotOpacity > 0.2 && distance < RISE_LEAD) risenAt[i] = t;
        if (risenAt[i] === null) {
          el.style.opacity = '0';
          el.style.transform = 'translateY(115%)';
          return;
        }
        const timeSinceRise = t - risenAt[i];
        let p = Math.min(1, Math.max(0, timeSinceRise / RISE_DURATION));
        p = easeOutCubic(p);
        el.style.opacity = p.toString();
        el.style.transform = `translateY(${(1 - p) * 115}%)`;
      });

      if (metaEl) {
        const pct = t / PERIOD;
        const phase =
          pct < 0.12 ? 'connecting' :
          pct < 0.30 ? 'indexing inbox' :
          pct < 0.46 ? 'reading roadmap' :
          pct < 0.62 ? 'sampling analytics' :
          pct < 0.76 ? 'opening studio' :
                       'ready';
        metaEl.textContent = phase;
      }

      rafId = requestAnimationFrame(frame);
    }

    function pause() {
      if (paused) return;
      paused = true;
      pausedAt = performance.now();
      if (rafId) cancelAnimationFrame(rafId);
    }
    function resume() {
      if (!paused) return;
      start += performance.now() - pausedAt;
      paused = false;
      rafId = requestAnimationFrame(frame);
    }
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) pause(); else resume();
    });
    window.addEventListener('resize', measure);

    requestAnimationFrame(() => {
      measure();
      rafId = requestAnimationFrame(frame);
    });
  })();
</script>

</body>
</html>
