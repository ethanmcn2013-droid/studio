<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 64" preserveAspectRatio="xMinYMid meet">


<g>
  <text x="0" y="48" class="wm ink" font-size="48">signal studio</text>
  <circle cx="256" cy="45" r="4" class="indigo dot" style="animation: signal-emit 2.6s cubic-bezier(.16,1,.3,1) infinite;"></circle>
  <circle cx="256" cy="45" r="4" fill="none" stroke="#4f46e5" stroke-width="1" style="--r0: 4; --rmax: 11; animation: signal-ring 2.6s cubic-bezier(.16,1,.3,1) infinite;"></circle>
  <text x="272" y="48" font-family="Geist,-apple-system,system-ui,sans-serif" font-size="48" font-weight="400" fill="#d4d4d8" letter-spacing="-2">/</text>
  <text x="298" y="48" class="wm ink" font-size="48">tasks</text>
  <circle cx="414" cy="22" r="3.6" class="indigo dot" style="animation: tasks-beat 1.6s cubic-bezier(.16,1,.3,1) infinite;"></circle>
</g>
</svg>