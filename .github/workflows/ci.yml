name: ci

# Production safety gate for the Signal Studio umbrella.
# Required gates (block merge): typecheck + test — both verified green.
# Lint is informational for now (Next 16 removed `next lint`; the script
# needs porting to a direct eslint call) so it reports without blocking.
# Added 2026-06-18 (production-readiness audit, blocker #3).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A fresh push supersedes an in-flight run for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # studio pins pnpm via the package.json "packageManager" field,
      # so action-setup needs no explicit version here.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      # SDS 2.0 drift gate — banned colours, system-token redefinition,
      # non-Geist fonts hard-fail; hex/easing debt ratchets via
      # .ds-grandfather.json (may only shrink).
      - name: Design-system drift gate
        run: pnpm run ds:check

      - name: Test
        run: pnpm test

      - name: Lint (informational — does not block)
        run: pnpm run lint
        continue-on-error: true
